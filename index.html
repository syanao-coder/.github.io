<!DOCTYPE html>
<html lang="ja" data-ui-size="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アニメ同時視聴コントローラー</title>
    <style>
        :root {
            --bg-color: #08080a;
            --panel-bg: rgba(24, 24, 32, 0.95);
            --text-color: #f5f5f7;
            --accent-color: #ff4757;
            --accent-hover: #ff6b81;
            --btn-bg: #2d2d3a;
            --btn-text: #ffffff;
            --border-color: #3a3a4a;
            --ui-scale: 1.25;
            --header-height: calc(30px * var(--ui-scale));
            --header-font: calc(0.75rem * var(--ui-scale));
            --btn-pad-y: calc(4px * var(--ui-scale));
            --btn-pad-x: calc(8px * var(--ui-scale));
        }
        [data-ui-size="small"] { --ui-scale: 0.9; }
        [data-ui-size="medium"] { --ui-scale: 1.25; }
        [data-ui-size="large"] { --ui-scale: 1.6; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; overflow: hidden; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; position: relative;
        }

        .top-bar {
            width: 100%; height: 35px; background-color: #0c0c10;
            border-bottom: 1px solid var(--border-color); display: flex;
            justify-content: flex-end; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 101; flex-shrink: 0;
        }

        .settings-toggle-btn {
            background: transparent; border: 1px solid #00ffcc; color: #00ffcc;
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
            font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .settings-toggle-btn:hover { background: rgba(0, 255, 204, 0.1); }
        .settings-toggle-btn.active { background: #00ffcc; color: #000; }

        /* トップバー内の枠数増減コントロール 【− n ＋】 */
        .topbar-count-group {
            display: flex; align-items: center; gap: 2px; margin-left: 14px;
            background: rgba(0, 0, 0, 0.45); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 1px 3px;
        }
        .topbar-count-btn {
            background: transparent; border: none; color: #00ffcc; cursor: pointer;
            font-size: 0.7rem; line-height: 1; padding: 3px 5px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; transition: background 0.15s;
        }
        .topbar-count-btn:hover:not(:disabled) { background: rgba(0, 255, 204, 0.18); }
        .topbar-count-btn:disabled { opacity: 0.28; cursor: default; }
        .topbar-count-value {
            font-family: monospace; font-weight: bold; font-size: 0.85rem; color: #fff;
            min-width: 16px; text-align: center; user-select: none;
        }

        /* マイリスト・セッションボタンの文字色バグ修正 */
        #topSessionBtn {
            border: 1px solid #ff9f43 !important;
            color: #ff9f43 !important;
            margin-right: 8px;
            background: transparent;
        }
        #topSessionBtn:hover {
            background: rgba(255, 159, 67, 0.1) !important;
        }
        #topSessionBtn.active {
            background: #ff9f43 !important;
            color: #000000 !important;
            border-color: #ff9f43 !important;
        }

        .settings-container {
            position: absolute; top: 35px; left: 0; width: 100%; z-index: 100;
            pointer-events: none; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateY(-100%);
        }
        .settings-container.open { transform: translateY(0); }

        .settings-content {
            background-color: var(--panel-bg); border-bottom: 2px solid #00ffcc;
            padding: 15px 25px; max-height: 450px; overflow-y: auto; pointer-events: auto;
            backdrop-filter: blur(10px); display: flex; gap: 25px; flex-wrap: wrap;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.15);
        }

        .settings-section {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px; flex: 1; min-width: 250px;
        }
        .settings-section h3 {
            margin: 0 0 10px 0; font-size: 0.95rem; color: #00ffcc;
            border-bottom: 1px solid var(--border-color); padding-bottom: 5px;
        }

        .control-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .control-row:last-child { margin-bottom: 0; }

        input[type="text"], input[type="number"], select {
            background-color: #0c0c10; border: 1px solid var(--border-color); color: var(--text-color);
            padding: 5px 8px; border-radius: 4px;
        }
        .compact-number-input {
            width: 45px; text-align: center; font-weight: bold; background: #0c0c10; border: 1px solid var(--border-color);
            color: #00ffcc; -webkit-appearance: auto !important; -moz-appearance: number-input !important;
        }

        button {
            background-color: var(--btn-bg); color: var(--btn-text); border: none;
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;
            font-size: 0.85rem; transition: background 0.2s;
        }
        button:hover { background-color: #3e3e52; }
        button.primary { background-color: var(--accent-color); }
        button.primary:hover { background-color: var(--accent-hover); }
        button.playing-state { background-color: #2e4a62; }
        button.playing-state:hover { background-color: #3f607d; }

        .main-view {
            width: 100vw; flex: 1; position: relative; background-color: #000;
            transition: padding-bottom 0.3s cubic-bezier(0.25, 1, 0.5, 1); box-sizing: border-box;
        }
        .main-view.controller-active { padding-bottom: 55px; }

        .players-grid {
            display: grid; width: 100%; height: 100%; gap: 6px; padding: 6px; box-sizing: border-box;
            grid-auto-flow: dense;
            /* 注意: 以前ここに transition: all 0.3s ease; があったが、
               grid-template-columns/rows のトラック数変化までアニメーション対象になり、
               枠数を変えた際に中間的な不正なサイズ比で止まる不具合の原因だったため削除。
               枠自体の見た目変化は .player-card 側の transition で十分カバーされる。 */
        }

        .player-card {
            background-color: #121216; border-radius: 6px; overflow: hidden; position: relative;
            display: flex; flex-direction: column; border: 1px solid var(--border-color); transition: all 0.3s ease;
            min-width: 0; min-height: 0; /* グリッドアイテムのデフォルトmin-width:autoによる突っ張り(＝レイアウト崩れ)を防止 */
        }
        .player-card.is-main {
            border: 2px solid #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); z-index: 2;
        }

        /* 押し下げ式（にゅっと出る）ヘッダー設定 */
        .player-header {
            position: relative; height: 0; overflow: hidden; background-color: #0c0c10;
            display: flex; justify-content: flex-start; align-items: center; padding: 0 10px;
            z-index: 10; font-size: var(--header-font); gap: calc(4px * var(--ui-scale));
            transition: height 0.18s cubic-bezier(0.25, 1, 0.5, 1), border-bottom 0.18s ease;
            flex-shrink: 0; box-sizing: border-box; border-bottom: 0px solid transparent;
        }
        /* チャタリング判定保護用の極小透明マージンを上部に確保 */
        .player-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 15;
        }
        .player-card:hover .player-header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border-color);
        }

        .player-title {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; padding: 0 5px;
            color: #00ebc7; font-weight: bold;
        }

        .header-action-btn {
            background-color: #31313e; color: #fff; border: none; padding: var(--btn-pad-y) var(--btn-pad-x);
            font-size: var(--header-font); border-radius: 4px; cursor: pointer; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .header-action-btn:hover { background-color: #52526e; }

        .pin-btn { background-color: transparent; border: none; color: #666; }
        .pin-btn.active { background-color: #00ffcc; color: #000; }
        .pin-btn:hover { background-color: rgba(255, 255, 255, 0.1); color: #ccc; }

        .playlist-nav-btn { background-color: #2e4a62; display: none; }
        .playlist-nav-btn:hover { background-color: #3f607d; }

        .delete-btn {
            background-color: #31313e; color: #ff4757; border: none; padding: var(--btn-pad-y) var(--btn-pad-x);
            font-size: var(--header-font); border-radius: 4px; cursor: pointer; line-height: 1;
            display: flex; align-items: center; justify-content: center; margin-left: 5px;
        }
        .delete-btn:hover { background-color: #52526e; color: #ff6b81; }

        .player-container-wrapper {
            display: flex; flex-direction: row; width: 100%; flex: 1; position: relative; background: #000; min-height: 0; min-width: 0;
        }
        .player-container { flex: 1; position: relative; background-color: #000; min-width: 0; min-height: 100px; display: flex; flex-direction: column; }
        .player-container iframe,.player-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .custom-local-video { cursor: pointer; }
        .chat-splitter { display: none; width: 4px; background: #1c1c24; z-index: 5; transition: background 0.2s; cursor: col-resize; }
        .chat-splitter:hover,.chat-splitter.dragging { background: #00ffcc; }
        .chat-container { display: none; width: 300px; background: #0c0c10; position: relative; }
        .local-video-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.85); padding: calc(6px * var(--ui-scale)) calc(12px * var(--ui-scale)); display: flex; align-items: center; gap: 12px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 9; }
        .player-card:hover .local-video-overlay { opacity: 1; pointer-events: auto; }
        .local-seek-container { position: relative; flex: 1; display: flex; align-items: center; }
        .local-seek-container input[type="range"] { width: 100%; height: 5px; cursor: pointer; }
        .seek-tooltip { position: absolute; bottom: 25px; background: rgba(0, 0, 0, 0.9); color: #00ffcc; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-family: monospace; pointer-events: none; transform: translateX(-50%); white-space: nowrap; border: 1px solid var(--border-color); display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 20; }
        .local-video-overlay span { font-size: var(--header-font); font-family: monospace; }
        .placeholder-box { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #121218; border: 2px dashed var(--border-color); box-sizing: border-box; padding: 20px; overflow-y: auto; }
        .placeholder-box input[type="text"] { width: 80%; max-width: 350px; margin-bottom: 10px; text-align: center; }
        .placeholder-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .overlay-controller { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%); background-color: rgba(20, 20, 26, 0.95); border: 1px solid var(--border-color); border-bottom: none; padding: 10px 20px; border-radius: 12px 12px 0 0; display: flex; align-items: center; gap: 12px; box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.7); z-index: 99; backdrop-filter: blur(8px); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); max-width: 95vw; }
        .overlay-controller.active { transform: translate(-50%, 0); }
        @media (max-width: 750px) { .overlay-controller { transform: translate(-50%, 100%) scale(0.85); transform-origin: bottom center; } .overlay-controller.active { transform: translate(-50%, 0) scale(0.85); } }
        @media (max-width: 550px) { .overlay-controller { transform: translate(-50%, 100%) scale(0.7); transform-origin: bottom center; } .overlay-controller.active { transform: translate(-50%, 0) scale(0.7); } }
        .controller-tab { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 26, 0.95); border: 1px solid var(--border-color); border-bottom: none; padding: 2px 20px; border-radius: 8px 8px 0 0; color: #fff; font-size: 0.75rem; opacity: 0.5; transition: opacity 0.2s; cursor: pointer; pointer-events: auto; }
        .overlay-controller.active .controller-tab { opacity: 1; } .controller-tab:hover { opacity: 1; background: #1c1c24; }
        .overlay-controller button, .overlay-controller span, .overlay-controller label { white-space: nowrap; flex-shrink: 0; }
        .lock-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 0; margin-right: 5px; transition: 0.2s; opacity: 0.7; } .lock-btn:hover { opacity: 1; }
        .sync-timer-container { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .sync-master-badge { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #2d2d3a; color: #aaa; border: 1px solid var(--border-color); margin-right: 4px; font-family: sans-serif; cursor: help; display: inline-block; }
        .sync-timer { font-size: 1.2rem; font-family: monospace; background: #000; padding: 2px 10px; border-radius: 15px; color: #00ffcc; border: 1px solid #00ffcc55; cursor: pointer; transition: 0.2s; }
        .sync-timer:hover { background: #111; border-color: #00ffcc; }
        .sync-timer-input { font-size: 1.2rem; font-family: monospace; background: #000; padding: 2px 8px; border-radius: 15px; color: #ff9f43; border: 1px solid #ff9f43; width: 100px; text-align: center; outline: none; display: none; }
        .timer-reset-btn { background-color: #222; color: #00ffcc; border: 1px solid #00ffcc33; border-radius: 50%; width: 24px; height: 24px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .timer-reset-btn:hover { background-color: #333; }
        .countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; font-weight: 900; color: #ff4757; text-shadow: 0 0 35px rgba(0, 0, 0, 0.95), 0 0 15px #ff4757; z-index: 1000; pointer-events: none; display: none; font-family: 'Arial Black', sans-serif; text-align: center; animation: countdownPulse 1s ease-in-out infinite; }
        @keyframes countdownPulse { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; } }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div class="top-bar">
        <span style="color:#00ffcc; font-size:0.85rem; font-weight:bold; letter-spacing:1px;">アニメ同時視聴コントローラー</span>
        <div class="topbar-count-group" style="margin-right:auto;" title="視聴枠数の増減（最大9枠）">
            <button class="topbar-count-btn" id="topCountMinus" onclick="changePlayerCount(-1)" title="枠を1つ減らす">➖</button>
            <span class="topbar-count-value" id="topActiveCountDisplay">2</span>
            <button class="topbar-count-btn" id="topCountPlus" onclick="changePlayerCount(1)" title="枠を1つ増やす">➕</button>
        </div>
        <button id="topSessionBtn" class="settings-toggle-btn" onclick="toggleSessionMenu()">📂 マイリスト・セッション</button>
        <button id="topSettingsBtn" class="settings-toggle-btn" onclick="toggleSettings()"><span id="topSettingsArrow">▼</span> 設定メニュー</button>
    </div>

    <div class="settings-container" id="sessionContainer">
        <div class="settings-content" style="border-bottom: 2px solid #ff9f43; max-height:450px;">
            <div class="settings-section">
                <h3>💾 現在の状態をマイリストに保存</h3>
                <div class="control-row">
                    <input type="text" id="sessionNameInput" placeholder="セッション名を入力 (空欄時は自動命名)" style="width:200px;">
                    <button class="primary" onclick="saveSessionManual()" style="background:#ff9f43; color:#000;">保存する</button>
                </div>
                <div class="control-row" style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                    <label style="font-size:0.9rem;">ファイル操作（インポート・エクスポート）:</label>
                </div>
                <div class="control-row">
                    <button onclick="exportSessionFile()" style="background:#444;">セッションの書き出し (.json)</button>
                    <span style="font-size:0.8rem; color:#888;">または</span>
                    <input type="file" id="importFileInput" accept=".json" onchange="importSessionFile(event)" style="font-size:0.75rem; width:160px;">
                </div>
            </div>
            <div class="settings-section" style="flex:2; min-width:300px;">
                <h3>📂 マイリスト・自動バックアップ履歴 (最大50件)</h3>
                <div id="sessionHistoryList" style="max-height:220px; overflow-y:auto; border:1px solid #333; border-radius:4px; padding:5px; background:rgba(0,0,0,0.3);"></div>
            </div>
        </div>
    </div>

    <div class="settings-container" id="settingsContainer">
        <div id="settingsContent" class="settings-content">
            <div class="settings-section">
                <h3>🖥 基本・レイアウト設定</h3>
                <div class="control-row">
                    <label style="font-size:0.9rem;">視聴枠数:</label>
                    <button onclick="changePlayerCount(-1)" style="padding:2px 8px;">➖</button>
                    <span id="activeCountDisplay" style="font-weight:bold; width:20px; text-align:center;">2</span>
                    <button onclick="changePlayerCount(1)" style="padding:2px 8px;">➕</button>
                    <span style="font-size:0.75rem; color:#888;">(最大9枠)</span>
                </div>
                <div class="control-row">
                    <label style="font-size:0.9rem;" for="layout2Dir">2窓時の並び方向:</label>
                    <select id="layout2Dir" onchange="updateLayout(); saveSettings();">
                        <option value="horizontal">左右に並べる</option>
                        <option value="vertical">上下に並べる</option>
                    </select>
                </div>
                <div class="control-row">
                    <label style="font-size:0.9rem;" for="layoutCols">グリッド列数 (レイアウト):</label>
                    <select id="layoutCols" onchange="updateLayout(); saveSettings();">
                        <option value="auto">自動 (最適化)</option>
                        <option value="1">1列 (縦積み)</option>
                        <option value="2">2列</option>
                        <option value="3">3列</option>
                        <option value="4">4列</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h3>⚙ 同期・一括操作設定</h3>
                <div class="control-row" style="margin-bottom: 8px;">
                    <label style="font-size:0.9rem;" for="syncMasterSelect">時間同調の基準（マスター）:</label>
                    <select id="syncMasterSelect" onchange="saveSettings(); updateMasterBadge();" style="color:#00ffcc; font-weight:bold;">
                        <option value="internal">内部タイマー（独立進行）</option>
                        <option value="external" id="optMasterExternal">外部配信サイト（未接続）</option>
                    </select>
                    <div id="syncMasterBadge" class="sync-master-badge" title="タイマーと全体の時間の基準になっている対象">基準: 内部タイマー</div>
                </div>
                <div class="control-row">
                    <label style="font-size:0.9rem;">戻るスキップ秒数:</label>
                    <input type="number" id="skipSecBack" value="10" min="1" max="180" step="1" class="compact-number-input" onchange="updateSkipDisplays(); saveSettings();"> 秒
                    <label style="font-size:0.9rem; margin-left:15px;">進むスキップ秒数:</label>
                    <input type="number" id="skipSecForward" value="10" min="1" max="180" step="1" class="compact-number-input" onchange="updateSkipDisplays(); saveSettings();"> 秒
                </div>
                <div class="control-row" style="margin-top:10px;">
                    <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.9rem;"><input type="checkbox" id="confirmReset" onchange="saveSettings()" checked> 箒アイコン（🧹）クリック時に確認表示する</label>
                </div>
                <div class="control-row">
                    <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.9rem;"><input type="checkbox" id="confirmDelete" onchange="saveSettings()" checked> ゴミ箱アイコン（🗑）クリック時に確認表示する</label>
                </div>
                <div class="control-row" style="margin-top:5px;">
                    <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.9rem;"><input type="checkbox" id="enableDelaySync" onchange="toggleDelaySettingView()"> ディレイスタート（カウントダウン）を有効にする</label>
                </div>
                <div class="control-row" id="delaySecContainer" style="display:none;">
                    <label style="font-size:0.9rem;">ディレイ秒数:</label>
                    <input type="number" id="delaySec" value="3" min="1" max="10" style="width:50px;" onchange="saveSettings()"> 秒
                </div>
            </div>

            <div class="settings-section">
                <h3>🎨 UI・デザイン設定</h3>
                <div class="control-row">
                    <label style="font-size:0.9rem;" for="uiSizeSelect">全体のUIサイズ:</label>
                    <select id="uiSizeSelect" onchange="changeUiSize(this.value)">
                        <option value="small">小（コンパクト）</option>
                        <option value="medium" selected>中（標準）</option>
                        <option value="large">大（操作性優先）</option>
                    </select>
                </div>
                <div class="control-row">
                    <label style="font-size:0.9rem;" for="chatPosition">チャット配置方向:</label>
                    <select id="chatPosition" onchange="updateChatLayout(); saveSettings();">
                        <option value="right">動画の右側</option>
                        <option value="bottom">動画の下側</option>
                    </select>
                </div>
                <div class="control-row" style="margin-top: 20px;">
                    <button onclick="clearAllSettings()" style="width:100%; background-color:#8e2430;">全設定・保存URLをリセット</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-view" id="mainView">
        <div class="players-grid" id="playersGrid"></div>
        <div class="countdown-overlay" id="countdownOverlay">3</div>
    </div>

    <div class="overlay-controller" id="overlayController">
        <div class="controller-tab">▲ 操作メニュー</div>
        <button id="lockControllerBtn" class="lock-btn" onclick="toggleControllerLock()" title="コントローラーを常に表示 (ロック)">🔓</button>
        <div class="sync-timer-container">
            <div class="sync-timer" id="mainTimer" onclick="editTimer()" title="クリックで手動入力(全動画をその時間へ同期)">00:00:00</div>
            <input type="text" id="timerInput" class="sync-timer-input" onblur="finishEditTimer()" onkeydown="if(event.key==='Enter')finishEditTimer()">
            <button class="timer-reset-btn" onclick="resetGlobalTimer()" title="タイマーを0にリセット (全動画同期)">↺</button>
            <button class="timer-reset-btn" id="requestExternalTimeBtn" onclick="requestExternalTime()" title="現在の外部動画の時間を取得してタイマーに同期" style="margin-left:2px;">⏱</button>
        </div>
        <button class="primary" id="playPauseBtn" onclick="togglePlayPauseAll()" style="font-size:0.95rem; padding:6px 12px;">▶ 一括再生</button>
        <div style="display:flex; align-items:center; background:rgba(0,0,0,0.4); padding:4px 6px; border-radius:8px;">
            <button id="batchSkipBackBtn" onclick="skipAll(-getSkipSecBack())" title="一括戻る" style="font-size:1rem;">↺</button>
            <span id="skipSecDisplay" style="font-size:0.75rem; margin:0 4px; color:#aaa; font-family:monospace;">[10s / 10s]</span>
            <button id="batchSkipForwardBtn" onclick="skipAll(getSkipSecForward())" title="一括進む" style="font-size:1rem;">↻</button>
        </div>
        <div style="display:flex; align-items:center; gap:2px; background:rgba(0,0,0,0.4); padding:4px 6px; border-radius:8px;">
            <span style="font-size:0.75rem; color:#aaa;">速度:</span>
            <button onclick="changePlaybackSpeed(-0.1)" style="padding:2px 6px;" title="0.1倍減速">➖</button>
            <span id="speedDisplay" style="font-family:monospace; font-weight:bold; width:28px; text-align:center; color:#00ffcc;">1.0</span>
            <button onclick="changePlaybackSpeed(0.1)" style="padding:2px 6px;" title="0.1倍加速">➕</button>
        </div>
        <div style="display:flex; align-items:center; gap:2px;">
            <span style="font-size:0.85rem;">🔊</span>
            <input type="range" id="masterVolume" min="0" max="100" value="50" style="width:60px;" oninput="changeMasterVolume(this.value)">
        </div>
    </div>

    <script>
        function formatTime(sec) {
            const hrs = Math.floor(sec / 3600);
            const mins = Math.floor((sec - hrs * 3600) / 60);
            const secs = Math.floor(sec % 60);
            const pad = (n) => n.toString().padStart(2, '0');
            return hrs > 0 ? pad(hrs) + ':' + pad(mins) + ':' + pad(secs) : pad(mins) + ':' + pad(secs);
        }
        function formatShortTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }
        function escapeJsString(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ').replace(/\r/g, '');
        }
        function getPlaylistId(url) {
            if (!url) return null;
            const match = url.match(/[?&]list=([^#\&\?]+)/);
            return match ? match[1] : null;
        }
        // silent=true のときは alert を出さない。
        // ➕送信ボタン経由の処理はユーザーがYouTube窓を見ているためalertに気づけず、
        // 代わりに YOUTUBE_ADD_RESULT でボタン上に結果を返す設計になっている。
        function getYouTubeId(url, silent) {
            if (!url) return null;
            const trimmed = url.trim();
            if (trimmed.includes('/shorts/')) {
                if (!silent) alert('ショート動画は同時視聴に対応していません。通常の動画を選択してください。');
                return null;
            }
            if (/^[a-zA-Z0-9_-]{11}$/.test(trimmed)) return trimmed;
            const match = trimmed.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        let uniqueCardIdCounter = 0; 
        let activeCardIds = []; 
        let ytPlayers = {};
        let isPlayingRequest = false;
        let globalCurrentTime = 0; 
        let globalDuration = 0; 
        let isEditingTimer = false;
        let lastTimeUpdate = performance.now();
        let countdownTimer = null;
        let countdownInterval = null;
        let currentPlaybackSpeed = 1.0;
        let isControllerLocked = false;
        let localSeekStartTime = {};
        let localSeekActive = {};
        let isExternalActive = false; 
        let externalSiteName = "";    
        let activeScrapeCardId = null; 
        let scrapedPopupRef = null;    
        let playerCount = 2; 
        const MAX_TOTAL_COUNT = 9;

        /* ------------------------------------------------------------
           枠ごとの「今入っている動画の識別キー」
             cardId → videoId（11文字） または 'list:<playlistId>'
           重複判定に使用する。
           URL文字列そのものは ?t= や ?pp= 等が付いて同一動画でも表記が揺れるため、
           必ずIDへ正規化してから比較する。
           ------------------------------------------------------------ */
        let cardVideoKeys = {};

        function buildVideoKey(url) {
            const videoId = getYouTubeId(url, true);
            if (videoId) return videoId;
            const playlistId = getPlaylistId(url);
            if (playlistId) return 'list:' + playlistId;
            return null;
        }

        // 1枠が持ちうるキーの一覧を返す。
        // プレイリスト枠は「リスト自体」と「今再生中の動画」の両方を持つ。
        function getSlotVideoKeys(cardId) {
            const keys = [];
            const stored = cardVideoKeys[cardId];
            if (stored) keys.push(stored);
            const yt = ytPlayers[cardId];
            if (yt && typeof yt.getVideoData === 'function') {
                try {
                    const data = yt.getVideoData();
                    if (data && data.video_id && keys.indexOf(data.video_id) === -1) keys.push(data.video_id);
                } catch (e) {}
            }
            return keys;
        }

        // 同じ動画が既に入っている枠の番号（1始まり）を返す。無ければ 0。
        function findDuplicateSlotIndex(key) {
            if (!key) return 0;
            const cards = getSortedCards();
            for (let i = 0; i < cards.length; i++) {
                if (getSlotVideoKeys(cards[i].id).indexOf(key) !== -1) return i + 1;
            }
            return 0;
        }

        // 表示順に基づく枠番号（1始まり）
        function getSlotIndex(cardId) {
            const cards = getSortedCards();
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].id === cardId) return i + 1;
            }
            return 0;
        }

        // ➕送信ボタンへの結果通知（A → B）
        function sendYoutubeAddResult(requestId, status, slotIndex) {
            if (!requestId) return; // 手動入力など、ボタン由来でない呼び出しは通知不要
            window.postMessage({
                type: 'CONTROLLER_TO_YOUTUBE',
                event: 'addVideoResult',
                requestId: requestId,
                status: status,
                slotIndex: slotIndex || 0
            }, '*');
        }

        // DOMロード完了時の安定起動
        document.addEventListener('DOMContentLoaded', () => { initApp(); });
        function initApp() {
            loadSavedSettings();
            updatePlayerCountDisplay();
            initializeGrid();
            setupHoverController();
            setupChatSplitters(); 
            updateSkipDisplays(); 
            startTimerTick();
        }
        function onYouTubeIframeAPIReady() {}

        // 枠数表示は「設定メニュー内」と「トップバー」の2箇所にあるため、
        // 片方だけ更新して食い違うことがないよう必ずこの関数経由で更新する。
        function updatePlayerCountDisplay() {
            const settingsEl = document.getElementById('activeCountDisplay');
            if (settingsEl) settingsEl.innerText = playerCount;
            const topEl = document.getElementById('topActiveCountDisplay');
            if (topEl) topEl.innerText = playerCount;
            const minusBtn = document.getElementById('topCountMinus');
            if (minusBtn) minusBtn.disabled = (playerCount <= 1);
            const plusBtn = document.getElementById('topCountPlus');
            if (plusBtn) plusBtn.disabled = (playerCount >= MAX_TOTAL_COUNT);
        }

        function setSelectValueSafe(id, value, fallback) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value !== undefined && value !== null && el.querySelector('option[value="' + value + '"]')) {
                el.value = value;
            } else if (fallback !== undefined) {
                el.value = fallback;
            }
        }
        function getSortedCards() {
            return Array.from(document.getElementById('playersGrid').children)
                .sort((a, b) => (parseInt(a.style.order, 10) || 0) - (parseInt(b.style.order, 10) || 0));
        }
        function getMasterLocalVideoId() {
            const cards = getSortedCards();
            for (let card of cards) {
                const lv = document.getElementById('localVideo_' + card.id);
                if (lv) return card.id;
            }
            return null;
        }
        function getCurrentMasterType() {
            const select = document.getElementById('syncMasterSelect');
            return select ? select.value : 'internal';
        }
        function updateMasterBadge() {
            const select = document.getElementById('syncMasterSelect');
            const optExt = document.getElementById('optMasterExternal');
            if (optExt) {
                const targetText = isExternalActive ? (externalSiteName ? '外部配信サイト (' + externalSiteName + ')' : '外部配信サイト (接続中)') : '外部配信サイト (未接続)';
                const targetDisabled = !isExternalActive;
                if (optExt.text !== targetText) optExt.text = targetText;
                if (optExt.disabled !== targetDisabled) optExt.disabled = targetDisabled;
                if (targetDisabled && select && select.value === 'external') select.value = 'internal';
            }
            const badge = document.getElementById('syncMasterBadge');
            if (badge && select) {
                const mode = select.value;
                if (mode === 'external') {
                    const label = externalSiteName ? '外部配信サイト (' + externalSiteName + ')' : '外部配信サイト';
                    badge.innerText = '基準: ' + label;
                    badge.style.color = '#ff9f43'; badge.style.borderColor = '#ff9f4355';
                } else if (mode.startsWith('local_')) {
                    const opt = select.querySelector('option[value="' + mode + '"]');
                    const label = opt ? opt.text.replace(/ローカル動画\s*\[枠\d+\]\s*/, "") : 'ローカル動画';
                    badge.innerText = '基準: ' + label;
                    badge.style.color = '#00ffcc'; badge.style.borderColor = '#00ffcc55';
                } else {
                    badge.innerText = '基準: 内部タイマー';
                    badge.style.color = '#aaa'; badge.style.borderColor = '#aaa55';
                }
            }
        }
        function updateMasterOptions() {
            const select = document.getElementById('syncMasterSelect');
            if (!select) return;
            const currentVal = select.value;
            const toRemove = [];
            for (let option of select.options) {
                if (option.value.startsWith('local_')) toRemove.push(option);
            }
            toRemove.forEach(opt => opt.remove());
            const cards = getSortedCards();
            cards.forEach((card, index) => {
                const lv = document.getElementById('localVideo_' + card.id);
                if (lv && lv.src && lv.src !== window.location.href) {
                    const titleText = document.getElementById('title_' + card.id).innerText;
                    const cleanTitle = titleText.replace("[Local] ", "").replace("[再選択待ち] ", "").substring(0, 15);
                    const opt = document.createElement('option');
                    opt.value = 'local_' + card.id;
                    opt.text = 'ローカル動画 [枠' + (index + 1) + '] (' + cleanTitle + ')';
                    select.appendChild(opt);
                }
            });
            if (select.querySelector('option[value="' + currentVal + '"]')) select.value = currentVal;
            else select.value = 'internal';
            updateMasterBadge();
        }

        function broadcastSyncCommand(action, value = null) {
            window.postMessage({ type: 'SYNC_CMD', action: action, value: value }, '*');
        }
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'EXTERNAL_SYNC_EVENT') {
                const newState = event.data.state;

                /* 【修正】旧実装は EXTERNAL_SYNC_EVENT を受信しただけで
                   isExternalActive = true としていたため、YouTubeの➕送信ボタンを押すたびに
                   時間基準（マスター）が「外部配信サイト」へ勝手に切り替わっていた。
                   実際に外部動画が再生中であることを示すのは timeReport 系のみなので、
                   マスター昇格はそこに限定する。 */
                if (newState === 'timeReport' || newState === 'relativeSeekReport') {
                    const wasActive = isExternalActive;
                    isExternalActive = true;
                    if (event.data.siteName) externalSiteName = event.data.siteName;
                    if (!wasActive) {
                        const select = document.getElementById('syncMasterSelect');
                        if (select) { select.value = 'external'; saveSettings(); }
                    }
                    updateMasterBadge();
                }

                if (newState === 'timeReport') {
                    globalCurrentTime = parseFloat(event.data.time) || 0;
                    updateTimerDisplay();
                } else if (newState === 'relativeSeekReport') {
                    const diff = parseFloat(event.data.diff !== undefined ? event.data.diff : event.data.time);
                    if (!isNaN(diff) && isFinite(diff)) applySeekToAll(diff, false, null);
                } else if (newState === 'youtubeScrapeReport') {
                    if (activeScrapeCardId && event.data.items) showScrapedResults(activeScrapeCardId, event.data.items);
                } else if (newState === 'addYoutubeVideo') {
                    addOrFillVideoSlot(event.data.url, event.data.title, event.data.requestId);
                }
            }
        });

        /* ------------------------------------------------------------
           YouTubeの「➕送信」ボタンから動画を受け取り、空き枠へ流し込む。

           requestId が付いている場合（＝送信ボタン由来）は、
           処理結果を YOUTUBE_ADD_RESULT として必ず1回返す。

           重複判定の方針:
             ・判定はここ（A側）で行う。B側は枠の状態を知らないため。
             ・判定キーは videoId（プレイリストは 'list:<id>'）。URL文字列では比較しない。
             ・比較対象は「全枠の現在の内容」。手動入力で入れた動画とも突き合わせる。
               （手動入力そのものは制限しない。弾くのは送信ボタン経由の投入のみ）
             ・🧹で枠をクリアすればキーも消えるので、同じ動画を再送信できる。
           ------------------------------------------------------------ */
        function addOrFillVideoSlot(url, title, requestId) {
            if (!url) { sendYoutubeAddResult(requestId, 'invalid'); return; }

            const key = buildVideoKey(url);
            if (!key) { sendYoutubeAddResult(requestId, 'invalid'); return; }

            // 1. 重複チェック（送信ボタン由来のときのみ弾く）
            if (requestId) {
                const dupIndex = findDuplicateSlotIndex(key);
                if (dupIndex > 0) {
                    sendYoutubeAddResult(requestId, 'duplicate', dupIndex);
                    return;
                }
            }

            // 2. 空き枠の探索（[再選択待ち]や🧹直後の枠も空きとして扱う）
            let emptyCardId = null;
            for (let id of activeCardIds) {
                const lv = document.getElementById('localVideo_' + id);
                const hasLocal = lv && lv.src && lv.src !== window.location.href;
                if (!hasLocal && !ytPlayers[id]) { emptyCardId = id; break; }
            }

            // 3. 空きが無ければ自動で増枠
            if (!emptyCardId) {
                if (playerCount >= MAX_TOTAL_COUNT) {
                    // 旧実装はここで alert() を出していたが、ユーザーはYouTube窓を見ており
                    // 気づけないため廃止し、ボタン上への結果通知に置き換えた。
                    sendYoutubeAddResult(requestId, 'slotFull');
                    if (!requestId) alert('最大枠数 (9枠) に達しているため、新しい枠を追加できません。');
                    return;
                }
                playerCount++;
                updatePlayerCountDisplay();
                initializeGrid();
                emptyCardId = activeCardIds[activeCardIds.length - 1];
            }

            // 4. 流し込み
            saveVideoToHistory(title || url, url, '', false);
            const input = document.getElementById('urlInput_' + emptyCardId);
            if (input) input.value = url;
            localStorage.setItem('sync_url_' + emptyCardId, url);
            loadSingleYT(emptyCardId, true);

            sendYoutubeAddResult(requestId, 'loaded', getSlotIndex(emptyCardId));
        }

        function toggleSettings() {
            const container = document.getElementById('settingsContainer');
            const btn = document.getElementById('topSettingsBtn');
            const arrow = document.getElementById('topSettingsArrow');
            const sessionContainer = document.getElementById('sessionContainer');
            if (sessionContainer.classList.contains('open')) toggleSessionMenu(false);
            if (container.classList.contains('open')) {
                container.classList.remove('open'); btn.classList.remove('active'); arrow.innerText = '▼';
            } else {
                container.classList.add('open'); btn.classList.add('active'); arrow.innerText = '▲';
            }
        }
        function toggleSessionMenu(forceClose) {
            const container = document.getElementById('sessionContainer');
            const btn = document.getElementById('topSessionBtn');
            const settingsContainer = document.getElementById('settingsContainer');
            if (settingsContainer.classList.contains('open')) {
                const sBtn = document.getElementById('topSettingsBtn');
                const arrow = document.getElementById('topSettingsArrow');
                settingsContainer.classList.remove('open'); sBtn.classList.remove('active'); arrow.innerText = '▼';
            }
            if (container.classList.contains('open') || forceClose === false) {
                container.classList.remove('open'); btn.classList.remove('active');
            } else {
                container.classList.add('open'); btn.classList.add('active');
                updateSessionListUI();
            }
        }
        function changeUiSize(size) {
            document.documentElement.setAttribute('data-ui-size', size);
            saveSettings();
        }
        function toggleDelaySettingView() {
            document.getElementById('delaySecContainer').style.display = document.getElementById('enableDelaySync').checked ? 'flex' : 'none';
            saveSettings();
        }
        function getSkipSecBack() { return parseFloat(document.getElementById('skipSecBack').value) || 10; }
        function getSkipSecForward() { return parseFloat(document.getElementById('skipSecForward').value) || 10; }
        function updateSkipDisplays() {
            const backSec = getSkipSecBack();
            const forwardSec = getSkipSecForward();
            const display = document.getElementById('skipSecDisplay');
            if (display) display.innerText = '[' + backSec + 's / ' + forwardSec + 's]';
            document.getElementById('batchSkipBackBtn').title = '一括' + backSec + '秒戻る';
            document.getElementById('batchSkipForwardBtn').title = '一括' + forwardSec + '秒進む';
            document.querySelectorAll('.skip-back-btn').forEach(btn => btn.title = backSec + '秒戻る');
            document.querySelectorAll('.skip-forward-btn').forEach(btn => btn.title = forwardSec + '秒進む');
        }
        function changePlayerCount(diff) {
            playerCount = Math.min(Math.max(1, playerCount + diff), MAX_TOTAL_COUNT);
            markSessionLineupChanged();
            updatePlayerCountDisplay();
            if (diff < 0) compactSavedUrls();
            initializeGrid();
        }
        function compactSavedUrls() {
            let urls = [];
            for (let i = 1; i <= MAX_TOTAL_COUNT; i++) {
                const url = localStorage.getItem('sync_url_' + i);
                if (url && url.trim()) urls.push(url.trim());
            }
            for (let i = 1; i <= MAX_TOTAL_COUNT; i++) localStorage.removeItem('sync_url_' + i);
            urls.forEach((url, index) => localStorage.setItem('sync_url_' + (index + 1), url));
        }
        function initializeGrid() {
            const grid = document.getElementById('playersGrid');
            while (activeCardIds.length < playerCount) {
                uniqueCardIdCounter++;
                const newId = 'card_' + uniqueCardIdCounter;
                activeCardIds.push(newId);
                // 個別カード生成で例外が出ても、以降のレイアウト確定処理を必ず実行させる。
                // （未定義関数の呼び出し等でここが中断すると updateLayout() に到達せず
                //   グリッドが暗黙の縦1列のままになるため）
                try {
                    createPlayerCard(newId);
                } catch (e) {
                    console.error('createPlayerCard failed for ' + newId + ':', e);
                }
            }
            while (activeCardIds.length > playerCount) {
                const removeId = activeCardIds.pop();
                try { destroyPlayerCard(removeId); } catch (e) { console.error(e); }
            }
            updateCardOrder();
            updateLayout();
            updateChatLayout();
            updateSkipDisplays();
            checkLocalVideoExists();
            updateMasterOptions();
            saveSettings();
        }
        function updateCardOrder() {
            const cards = getSortedCards();
            cards.forEach((card, index) => { card.style.order = index + 1; });
            activeCardIds = cards.map(c => c.id);
        }

        function generateHeaderHTML(cardId) {
            const backSec = getSkipSecBack();
            const forwardSec = getSkipSecForward();
            return '<div class="player-header">' +
                '<button class="header-action-btn pin-btn" onclick="togglePin(\'' + cardId + '\')" title="メイン枠として拡大(ピン留め)">📌</button>' +
                '<button class="header-action-btn skip-back-btn" onclick="skipPlayer(\'' + cardId + '\', -getSkipSecBack())" title="' + backSec + '秒戻る">↺</button>' +
                '<button class="header-action-btn skip-forward-btn" onclick="skipPlayer(\'' + cardId + '\', getSkipSecForward())" title="' + forwardSec + '秒進む">↻</button>' +
                '<button class="header-action-btn playlist-nav-btn" id="playlistPrev_' + cardId + '" onclick="prevPlaylistItem(\'' + cardId + '\')" title="再生リスト: 前の動画">⏮</button>' +
                '<button class="header-action-btn playlist-nav-btn" id="playlistNext_' + cardId + '" onclick="nextPlaylistItem(\'' + cardId + '\')" title="再生リスト: 次の動画">⏭</button>' +
                '<span class="player-title" id="title_' + cardId + '">未ロード</span>' +
                '<div style="margin-left: auto; display: flex; gap: calc(4px * var(--ui-scale));">' +
                    '<button class="header-action-btn" onclick="reloadPlayer(\'' + cardId + '\')" title="再読み込み">🔄</button>' +
                    '<button class="header-action-btn" onclick="resetPlayer(\'' + cardId + '\')" title="空にする">🧹</button>' +
                    '<button class="delete-btn" onclick="deletePlayer(\'' + cardId + '\')" title="枠を削除して詰める">🗑</button>' +
                    '<button class="header-action-btn" style="margin-left: 5px;" onclick="moveCard(\'' + cardId + '\', -1)" title="左(前)へ移動">◀</button>' +
                    '<button class="header-action-btn" onclick="moveCard(\'' + cardId + '\', 1)" title="右(後)へ移動">▶</button>' +
                '</div>' +
            '</div>';
        }
        function generatePlaceholderHTML(cardId) {
            return '<div style="width: 100%; height: 100%; display: flex; flex-direction: column; background-color: #121218; box-sizing: border-box; padding: 20px; overflow-y: auto;">' +
                // 入力欄と操作ボタンを flex:1 の領域に入れ、justify-content:center で枠内の垂直中央へ寄せる
                '<div style="flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%;">' +
                    '<div style="text-align:center; margin-bottom:10px; width:100%;">' +
                        '<input type="text" id="urlInput_' + cardId + '" placeholder="YouTube URLを入力、または検索ワード" style="width:80%; max-width:350px;">' +
                    '</div>' +
                    '<div class="placeholder-actions">' +
                        '<button class="primary" onclick="loadSingleYT(\'' + cardId + '\')">読み込む</button>' +
                        '<button onclick="triggerYtTop(\'' + cardId + '\')" style="background:#ff4757; color:#fff; font-weight:bold;">別窓でYouTubeを開く</button>' +
                        '<input type="file" accept="video/*" onchange="handleLocalSelect(event, \'' + cardId + '\')" style="width:130px; font-size:0.75rem;">' +
                    '</div>' +
                '</div>' +

        function captureLocalVideoThumbnail(video, fileName, cardId) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 120; canvas.height = 68;
                const ctx = canvas.getContext('2d');

                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

            } catch (e) { saveVideoToHistory(fileName, 'localVideo_' + cardId, '', true); }

        /* ============================================================
           以下の関数群は呼び出されていたが定義が存在せず、

           その結果 initializeGrid() が中断し updateLayout() に到達せず、

        function updateLocalTimeDisplay(cardId) {
            const video = document.getElementById('localVideo_' + cardId);
            const display = document.getElementById('localTimeDisplay_' + cardId);
            if (!video || !display) return;
            const dur = isFinite(video.duration) ? video.duration : 0;
            display.innerText = formatTime(video.currentTime) + ' / ' + formatTime(dur);
        }

        function setupSeekTooltip(cardId) {
            const seek = document.getElementById('localSeek_' + cardId);
            const tooltip = document.getElementById('seekTooltip_' + cardId);
            if (!seek || !tooltip) return;
            const showAt = function(clientX) {
                const video = document.getElementById('localVideo_' + cardId);
                const rect = seek.getBoundingClientRect();
                if (!rect.width) return;
                let ratio = (clientX - rect.left) / rect.width;
                ratio = Math.max(0, Math.min(1, ratio));
                const dur = (video && isFinite(video.duration)) ? video.duration : 0;
                tooltip.innerText = formatTime(dur * ratio);
                tooltip.style.left = (ratio * rect.width) + 'px';
                tooltip.style.display = 'block';
            };
            seek.addEventListener('mouseenter', function(e) { showAt(e.clientX); });
            seek.addEventListener('mousemove', function(e) { showAt(e.clientX); });
            seek.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
        }

        function handleLocalSelect(event, cardId) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            if (ytPlayers[cardId]) { try { ytPlayers[cardId].destroy(); } catch (e) {} delete ytPlayers[cardId]; }
            delete cardVideoKeys[cardId]; // ローカル動画に差し替わったのでYouTube側のキーは破棄
            localStorage.removeItem('sync_url_' + cardId);
            markSessionLineupChanged(); // 動画構成が変わったので新しい視聴セット扱い

            const container = document.getElementById('playerContainer_' + cardId);
            container.innerHTML = '<video id="localVideo_' + cardId + '" class="custom-local-video" playsinline></video>';
            const video = document.getElementById('localVideo_' + cardId);
            video.src = URL.createObjectURL(file);

            const masterVolEl = document.getElementById('masterVolume');
            const vol = masterVolEl ? (parseFloat(masterVolEl.value) || 0) / 100 : 0.5;
            video.volume = Math.max(0, Math.min(1, vol));
            video.playbackRate = currentPlaybackSpeed;

            document.getElementById('title_' + cardId).innerText = '[Local] ' + file.name;
            document.getElementById('localOverlay_' + cardId).style.display = 'flex';
            const volInput = document.getElementById('localVolume_' + cardId);
            if (volInput) volInput.value = Math.round(video.volume * 100);

            video.addEventListener('loadedmetadata', function() {
                const seek = document.getElementById('localSeek_' + cardId);
                if (seek && isFinite(video.duration)) {
                    seek.min = 0; seek.max = video.duration; seek.step = 0.1; seek.value = video.currentTime;
                }
                updateLocalTimeDisplay(cardId);
                checkLocalVideoExists();
                updateMasterOptions();
                // ローカル動画がロードされた瞬間、自動的にマスター（時間基準）へ昇格
                const select = document.getElementById('syncMasterSelect');
                if (select && select.querySelector('option[value="local_' + cardId + '"]')) {
                    select.value = 'local_' + cardId;
                    updateMasterBadge();
                    saveSettings();
                }
            });

            video.addEventListener('loadeddata', function() {
                captureLocalVideoThumbnail(video, file.name, cardId);
            });

            video.addEventListener('timeupdate', function() {
                if (localSeekActive[cardId]) return;
                const seek = document.getElementById('localSeek_' + cardId);
                if (seek) seek.value = video.currentTime;
                updateLocalTimeDisplay(cardId);
            });

            video.addEventListener('click', function() { togglePlayLocal(cardId); });
        }

        function togglePlayLocal(cardId) {
            const video = document.getElementById('localVideo_' + cardId);
            if (!video) return;
            if (video.paused) video.play().catch(function(e) {});
            else video.pause();
        }

        function onLocalSeekStart(cardId) {
            const video = document.getElementById('localVideo_' + cardId);
            localSeekActive[cardId] = true;
            localSeekStartTime[cardId] = video ? video.currentTime : 0;
        }

        function updateLocalTimeOnInput(cardId, value) {
            const video = document.getElementById('localVideo_' + cardId);
            const display = document.getElementById('localTimeDisplay_' + cardId);
            if (!video || !display) return;
            const dur = isFinite(video.duration) ? video.duration : 0;
            display.innerText = formatTime(parseFloat(value) || 0) + ' / ' + formatTime(dur);
        }

        function onLocalSeekEnd(cardId) {
            const video = document.getElementById('localVideo_' + cardId);
            const seek = document.getElementById('localSeek_' + cardId);
            if (!video || !seek) { localSeekActive[cardId] = false; return; }
            const newTime = parseFloat(seek.value) || 0;
            const oldTime = (localSeekStartTime[cardId] !== undefined) ? localSeekStartTime[cardId] : video.currentTime;
            video.currentTime = newTime;
            localSeekActive[cardId] = false;
            // この動画がマスターの場合のみ、差分を全体へ同期（自分自身は除外）
            if (getCurrentMasterType() === 'local_' + cardId) {
                const diff = newTime - oldTime;
                if (isFinite(diff) && Math.abs(diff) > 0.01) applySeekToAll(diff, true, cardId);
            }
            updateLocalTimeDisplay(cardId);
        }

        function changeLocalVideoVolume(cardId, value) {
            const video = document.getElementById('localVideo_' + cardId);
            if (!video) return;
            video.volume = Math.max(0, Math.min(1, (parseFloat(value) || 0) / 100));
            const icon = document.getElementById('localVolIcon_' + cardId);
            if (icon) icon.innerText = video.volume === 0 ? '🔇' : (video.volume < 0.5 ? '🔉' : '🔊');

        function saveSessionState(name, isAutoSave = false) {
            const newState = getNewSessionState(name, isAutoSave);

            if (isAutoSave) {
                let autosaves = list.filter(item => item.isAutoSave);
                let manualSaves = list.filter(item => !item.isAutoSave);
                autosaves.unshift(newState);
                if (autosaves.length > 10) autosaves = autosaves.slice(0, 10);
                list = [...manualSaves, ...autosaves];
            } else { list.unshift(newState); }
            if (list.length > 50) list = list.slice(0, 50);
            localStorage.setItem('sync_session_history', JSON.stringify(list));
            updateSessionListUI();

                    '</div>' +

            if (p.type === 'yt') {

                const container = document.getElementById('playerContainer_' + p.cardId);
                container.innerHTML = '<div id="ytPlayer_' + p.cardId + '"></div>';
                let playerVarsSetting = { 'playsinline': 1, 'controls': 1, 'rel': 0, 'start': Math.floor(p.currentTime) };
                const playlistId = getPlaylistId(p.url);
                cardVideoKeys[p.cardId] = playlistId ? ('list:' + playlistId) : getYouTubeId(p.url, true);
                if (playlistId) { playerVarsSetting.listType = 'playlist'; playerVarsSetting.list = playlistId; }
                ytPlayers[p.cardId] = new YT.Player('ytPlayer_' + p.cardId, {

                    playerVars: playerVarsSetting,
                    events: {
                        'onReady': (event) => {
                            document.getElementById('title_' + p.cardId).innerText = p.title;
                            event.target.setVolume(document.getElementById('masterVolume').value);
                            event.target.setPlaybackRate(currentPlaybackSpeed);

                            if (playlistId) {
                                document.getElementById('playlistPrev_' + p.cardId).style.display = 'inline-block';
                                document.getElementById('playlistNext_' + p.cardId).style.display = 'inline-block';
                            }

            } else if (p.type === 'local') {
                const safeTitle = escapeJsString(p.title);
                document.getElementById('title_' + p.cardId).innerText = '[再選択待ち] ' + p.title;
                const container = document.getElementById('playerContainer_' + p.cardId);
                container.innerHTML = '<div class="placeholder-box" style="border-color:#ff4757;">' +
                    '<span style="color:#ff4757; font-weight:bold; font-size:0.9rem; margin-bottom:10px;">ファイル再選択待ち</span>' +
                    '<div style="font-size:0.8rem; color:#ccc; margin-bottom:15px; text-align:center;">「' + safeTitle + '」を再アップロードしてください。<br>自動的に <strong>' + formatTime(p.currentTime) + '</strong> から再開します。</div>' +
                    '<input type="file" accept="video/*" onchange="handleLocalReSelect(event, \'' + p.cardId + '\', ' + p.currentTime + ')" style="width:200px; font-size:0.8rem;">' +
                    '</div>';
            }
        }
        function handleLocalReSelect(event, cardId, targetTime) {
            handleLocalSelect(event, cardId);
            setTimeout(() => {
                const video = document.getElementById('localVideo_' + cardId);
                if (video) video.currentTime = targetTime;

        }
        function updateSessionListUI() {

            if (list.length === 0) {

                let badges = '';
                session.players.forEach(p => {
                    if (p.type === 'yt') badges += '<span style="background:#ff0000; color:#fff; font-size:0.6rem; padding:1px 3px; border-radius:2px; margin-right:2px; font-weight:bold;">YT</span>';
                    else if (p.type === 'local') badges += '<span style="background:#00ffcc; color:#000; font-size:0.6rem; padding:1px 3px; border-radius:2px; margin-right:2px; font-weight:bold;">Local</span>';
