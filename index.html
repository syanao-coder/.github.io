                    '</div><button onclick="deleteSessionByIndex(' + index + ')" style="background:transparent; color:#ff4757; border:none; padding:4px; font-size:0.75rem; cursor:pointer;" title="この履歴を消去">✕</button></div>';
            });
            listEl.innerHTML = html;
        }
        function loadSessionByIndex(index) {
            const list = JSON.parse(localStorage.getItem('sync_session_history')) || [];
            if (list[index] && confirm('セッションをロードして現在の状態を復元しますか？')) loadSession(list[index]);
        }
        function deleteSessionByIndex(index) {
            let list = JSON.parse(localStorage.getItem('sync_session_history')) || [];
            list.splice(index, 1);
            localStorage.setItem('sync_session_history', JSON.stringify(list));
            updateSessionListUI();
        }
        function exportSessionFile() {
            const state = getNewSessionState("エクスポートセッション", false);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", 'sync_session_' + Date.now() + '.json');
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
        function importSessionFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const session = JSON.parse(e.target.result);
                    if (session && session.playerCount) {
                        if (confirm('外部ファイル「' + file.name + '」からセッションをインポートしますか？')) loadSession(session);
                    } else { alert('不正なセッションファイル形式です。'); }
                } catch (err) { alert('ファイルの読み込みに失敗しました。'); }
            };
            reader.readAsText(file);
        }

        /* ------------------------------------------------------------
           自動バックアップのトリガー
           旧: 30秒ごとの定期実行（ほぼ同一の履歴が大量に溜まる）
           新: 以下をすべて満たしたときに1回だけ保存
               1) 開いている枠すべてに動画が読み込まれている
               2) 一括再生ボタンが押された
               3) その視聴セット（ラインナップ）で初回である
           ------------------------------------------------------------ */

        // 現在のラインナップで既に自動保存済みかどうかのフラグ
        let hasAutoSavedThisSession = false;

        // 動画の構成が変わったら「新しい視聴セット」とみなしフラグを戻す
        function markSessionLineupChanged() {
            hasAutoSavedThisSession = false;
        }

        // 開いている枠すべてに動画（YouTube または ローカル）が入っているか判定
        function areAllSlotsLoaded() {
            if (!activeCardIds.length) return false;
            return activeCardIds.every(function(id) {
                const lv = document.getElementById('localVideo_' + id);
                if (lv && lv.src && lv.src !== window.location.href) return true;
                if (ytPlayers[id]) return true;
                return false; // 空枠・[再選択待ち]状態はいずれも未ロード扱い
            });
        }

        function tryAutoSaveOnFirstPlay() {
            if (hasAutoSavedThisSession) return;
            if (!areAllSlotsLoaded()) return;
            saveSessionState(null, true);
            hasAutoSavedThisSession = true;
        }

        // タブを閉じる／リロードする直前の保険的な保存は従来どおり残す
        window.addEventListener('beforeunload', () => { saveSessionState(null, true); });

        function destroyPlayerCard(cardId) {
            if (ytPlayers[cardId]) { try { ytPlayers[cardId].destroy(); } catch(e){} delete ytPlayers[cardId]; }
            delete cardVideoKeys[cardId];
            const card = document.getElementById(cardId);
            if (card) card.remove();
        }
        function checkLocalVideoExists() {
            let hasLocal = false;
            document.querySelectorAll('.custom-local-video').forEach(v => { if (v.src && v.src !== window.location.href) hasLocal = true; });
            const extBtn = document.getElementById('requestExternalTimeBtn');
            if (extBtn) extBtn.style.display = hasLocal ? 'none' : 'flex';
        }
        function reloadPlayer(cardId) {
            const lv = document.getElementById('localVideo_' + cardId);
            if (lv && lv.src) {
                lv.load();
                if (isPlayingRequest) lv.play().catch(e=>{});
                return;
            }
            if (ytPlayers[cardId]) loadSingleYT(cardId);
        }
        function resetPlayer(cardId) {
            const needsConfirm = document.getElementById('confirmReset').checked;
            if (needsConfirm && !confirm('この枠の動画をクリアし、URL入力待ちに戻しますか？')) return;
            if (ytPlayers[cardId]) { try { ytPlayers[cardId].destroy(); } catch(e){} delete ytPlayers[cardId]; }
            delete cardVideoKeys[cardId]; // 枠を空にしたので重複判定の対象外に戻す
            const lv = document.getElementById('localVideo_' + cardId);
            if (lv) { lv.pause(); lv.src = ""; lv.load(); }
            document.getElementById('title_' + cardId).innerText = '未ロード';
            document.getElementById('playlistPrev_' + cardId).style.display = 'none';
            document.getElementById('playlistNext_' + cardId).style.display = 'none';
            document.getElementById('localOverlay_' + cardId).style.display = 'none';
            document.getElementById('chatContainer_' + cardId).style.display = 'none';
            document.getElementById('splitter_' + cardId).style.display = 'none';
            document.getElementById('chatIframe_' + cardId).src = '';
            document.getElementById('playerContainer_' + cardId).innerHTML = generatePlaceholderHTML(cardId);
            markSessionLineupChanged();
            resaveUrlsBasedOnOrder(); checkLocalVideoExists(); updateMasterOptions();
        }
        function deletePlayer(cardId) {
            const needsConfirm = document.getElementById('confirmDelete').checked;
            if (needsConfirm && !confirm('この枠を完全に削除し、番号を前に詰めますか？')) return;
            destroyPlayerCard(cardId); playerCount--;
            markSessionLineupChanged();
            updatePlayerCountDisplay();
            updateCardOrder(); updateLayout(); updateChatLayout(); updateSkipDisplays(); checkLocalVideoExists(); updateMasterOptions(); saveSettings();
        }
        function resaveUrlsBasedOnOrder() {
            for (let i = 1; i <= MAX_TOTAL_COUNT; i++) localStorage.removeItem('sync_url_' + i);
            const cards = getSortedCards();
            cards.forEach((card, index) => {
                const input = document.getElementById('urlInput_' + card.id);
                if (input && input.value.trim()) localStorage.setItem('sync_url_' + (index + 1), input.value.trim());
            });
        }
        function moveCard(cardId, direction) {
            const cards = getSortedCards();
            const currentIndex = cards.findIndex(c => c.id === cardId);
            if (currentIndex === -1) return;
            const targetIndex = currentIndex + direction;
            if (targetIndex < 0 || targetIndex >= cards.length) return; 
            const currentOrder = cards[currentIndex].style.order;
            cards[currentIndex].style.order = cards[targetIndex].style.order;
            cards[targetIndex].style.order = currentOrder;
            activeCardIds = getSortedCards().map(c => c.id);
            updateLayout(); resaveUrlsBasedOnOrder(); updateMasterOptions();
        }
        function togglePin(cardId) {
            const grid = document.getElementById('playersGrid');
            const cards = Array.from(grid.children);
            const target = document.getElementById(cardId);
            const btn = target.querySelector('.pin-btn');
            if (target.classList.contains('is-main')) {
                target.classList.remove('is-main'); btn.classList.remove('active');
            } else {
                cards.forEach(c => { c.classList.remove('is-main'); const b = c.querySelector('.pin-btn'); if (b) b.classList.remove('active'); });
                target.classList.add('is-main'); btn.classList.add('active');
            }
            updateLayout();
        }
        function updateLayout() {
            const grid = document.getElementById('playersGrid');
            const cards = Array.from(grid.children);
            const N = cards.length;
            if (N === 0) return;
            if (N === 1) {
                grid.style.gridTemplateColumns = 'minmax(0, 1fr)'; grid.style.gridTemplateRows = 'minmax(0, 1fr)';
                cards[0].style.gridColumn = 'span 1'; cards[0].style.gridRow = 'span 1'; return;
            }
            const hasPin = cards.some(c => c.classList.contains('is-main'));
            let colSetting = document.getElementById('layoutCols') ? document.getElementById('layoutCols').value : 'auto';
            if (N === 2) {
                const dir = document.getElementById('layout2Dir').value;
                if (dir === 'vertical') {
                    grid.style.gridTemplateColumns = 'minmax(0, 1fr)'; grid.style.gridTemplateRows = hasPin ? 'minmax(0, 2fr) minmax(0, 1fr)' : 'minmax(0, 1fr) minmax(0, 1fr)';
                } else { 
                    if (hasPin) { grid.style.gridTemplateColumns = 'minmax(0, 1fr)'; grid.style.gridTemplateRows = 'minmax(0, 2fr) minmax(0, 1fr)'; } 
                    else { grid.style.gridTemplateColumns = 'minmax(0, 1fr) minmax(0, 1fr)'; grid.style.gridTemplateRows = 'minmax(0, 1fr)'; }
                }
                cards.forEach(c => { c.style.gridColumn = 'span 1'; c.style.gridRow = 'span 1'; }); return;
            }
            const logicalCount = hasPin ? N + 3 : N;
            const parsedCols = parseInt(colSetting, 10);
            let cols;
            if (colSetting !== 'auto' && Number.isInteger(parsedCols) && parsedCols >= 1 && parsedCols <= 4) {
                // 手動指定（1〜4列）が有効な場合のみそれを使用
                cols = parsedCols;
            } else {
                // 'auto'、または不正な値（空文字列・NaN等）の場合は自動計算にフォールバック
                // ※以前はここでNaNになりgrid-template-columnsが無効化され、縦1列に積まれるバグがあった
                if (logicalCount <= 4) cols = 2;
                else if (logicalCount <= 6) cols = 3;
                else if (logicalCount <= 9) cols = 3;
                else cols = 4;
            }
            const rows = Math.ceil(logicalCount / cols);
            grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';
            grid.style.gridTemplateRows = 'repeat(' + rows + ', minmax(0, 1fr))';
            cards.forEach(c => {
                if (c.classList.contains('is-main')) {
                    const spanCol = Math.min(2, cols);
                    c.style.gridColumn = 'span ' + spanCol; c.style.gridRow = 'span 2';
                } else { c.style.gridColumn = 'span 1'; c.style.gridRow = 'span 1'; }
            });
        }
        function updateChatLayout() {
            const pos = document.getElementById('chatPosition').value;
            const direction = pos === 'right' ? 'row' : 'column';
            const cursor = pos === 'right' ? 'col-resize' : 'row-resize';
            activeCardIds.forEach(cardId => {
                const wrapper = document.getElementById('wrapper_' + cardId);
                const splitter = document.getElementById('splitter_' + cardId);
                const chatContainer = document.getElementById('chatContainer_' + cardId);
                if (wrapper && splitter && chatContainer) {
                    wrapper.style.flexDirection = direction; splitter.style.cursor = cursor;
                    if (pos === 'right') {
                        splitter.style.width = '4px'; splitter.style.height = '100%';
                        chatContainer.style.width = '300px'; chatContainer.style.height = 'auto';
                    } else {
                        splitter.style.width = '100%'; splitter.style.height = '4px';
                        chatContainer.style.width = '100%'; chatContainer.style.height = '300px';
                    }
                }
            });
        }
        function setupChatSplitters() {
            let isDragging = false, currentSplitter = null, currentChat = null, currentIframe = null, isHorizontal = true;
            document.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('chat-splitter')) {
                    isDragging = true; currentSplitter = e.target; currentChat = e.target.nextElementSibling;
                    currentIframe = currentChat.querySelector('iframe');
                    isHorizontal = document.getElementById('chatPosition').value === 'right';
                    currentSplitter.classList.add('dragging'); 
                    if (currentIframe) currentIframe.style.pointerEvents = 'none'; e.preventDefault();
                }
            });
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const rect = currentSplitter.parentElement.getBoundingClientRect();
                if (isHorizontal) {
                    let newWidth = Math.max(200, Math.min(rect.right - e.clientX, rect.width * 0.7)); 
                    currentChat.style.width = newWidth + 'px';
                } else {
                    let newHeight = Math.max(150, Math.min(rect.bottom - e.clientY, rect.height * 0.7));
                    currentChat.style.height = newHeight + 'px';
                }
            });
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false; 
                    if (currentSplitter) currentSplitter.classList.remove('dragging');
                    if (currentIframe) currentIframe.style.pointerEvents = 'auto';
                }
            });
        }

        function applySeekToAll(diff, broadcastToAddon, excludeCardId = null) {
            globalCurrentTime = Math.max(0, globalCurrentTime + diff);
            updateTimerDisplay();
            if (broadcastToAddon) broadcastSyncCommand('seek', diff);
            document.querySelectorAll('.custom-local-video').forEach(v => {
                const id = v.id.replace('localVideo_', '');
                if (id !== excludeCardId) v.currentTime = Math.max(0, v.currentTime + diff);
            });
            Object.entries(ytPlayers).forEach(([id, player]) => {
                if (id !== excludeCardId && player && typeof player.getCurrentTime === 'function') {
                    player.seekTo(Math.max(0, player.getCurrentTime() + diff), true);
                }
            });
        }
        function skipPlayer(cardId, seconds) {
            const yt = ytPlayers[cardId];
            const lv = document.getElementById('localVideo_' + cardId);
            if (yt && typeof yt.getCurrentTime === 'function') yt.seekTo(Math.max(0, yt.getCurrentTime() + seconds), true);
            else if (lv) lv.currentTime = Math.max(0, lv.currentTime + seconds);
        }
        function changePlaybackSpeed(val) {
            currentPlaybackSpeed = Math.min(2.0, Math.max(0.25, currentPlaybackSpeed + val));
            currentPlaybackSpeed = parseFloat(currentPlaybackSpeed.toFixed(1)); 
            document.getElementById('speedDisplay').innerText = currentPlaybackSpeed.toFixed(1);
            applyPlaybackSpeed(); saveSettings();
        }
        function applyPlaybackSpeed() {
            document.querySelectorAll('.custom-local-video').forEach(v => v.playbackRate = currentPlaybackSpeed);
            Object.values(ytPlayers).forEach(player => {
                if (player && typeof player.setPlaybackRate === 'function') player.setPlaybackRate(currentPlaybackSpeed);
            });
            broadcastSyncCommand('speed', currentPlaybackSpeed);
        }

        function togglePlayPauseAll() {
            if (isPlayingRequest) pauseAll();
            else {
                // 「全枠ロード済み」かつ「このラインナップで初回」の再生時のみ自動バックアップ
                tryAutoSaveOnFirstPlay();
                const isDelayEnabled = document.getElementById('enableDelaySync').checked;
                if (isDelayEnabled) startDelayCountdown(); else playAll();
            }
        }
        function startDelayCountdown() {
            cancelCountdown();
            isPlayingRequest = true; 
            const playPauseBtn = document.getElementById('playPauseBtn');
            playPauseBtn.innerText = '⏸ カウント中止'; playPauseBtn.classList.remove('primary'); playPauseBtn.classList.add('playing-state');
            const overlay = document.getElementById('countdownOverlay');
            overlay.style.display = 'block';
            let count = parseInt(document.getElementById('delaySec').value, 10) || 3;
            overlay.innerText = count;
            countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    overlay.innerText = count; overlay.style.animation = 'none'; overlay.offsetHeight; overlay.style.animation = '';
                } else if (count === 0) {
                    overlay.innerText = 'START!'; overlay.style.color = '#00ffcc'; overlay.style.textShadow = '0 0 35px rgba(0,0,0,0.95), 0 0 15px #00ffcc';
                    const pBtn = document.getElementById('playPauseBtn');
                    pBtn.innerText = '⏸ 一括停止';
                    playAllPlayersOnly(); 
                    countdownTimer = setTimeout(() => {
                        overlay.style.display = 'none'; overlay.style.color = '#ff4757'; overlay.style.textShadow = '0 0 35px rgba(0, 0, 0, 0.95), 0 0 15px #ff4757';
                    }, 800);
                    clearInterval(countdownInterval); countdownInterval = null;
                }
            }, 1000);
        }
        function cancelCountdown() {
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            clearTimeout(countdownTimer);
            const overlay = document.getElementById('countdownOverlay');
            overlay.style.display = 'none'; overlay.style.color = '#ff4757';
        }
        function playAll() {
            isPlayingRequest = true;
            const btn = document.getElementById('playPauseBtn');
            btn.innerText = '⏸ 一括停止'; btn.classList.remove('primary'); btn.classList.add('playing-state');
            playAllPlayersOnly();
        }
        function pauseAll() {
            isPlayingRequest = false;
            cancelCountdown();
            const btn = document.getElementById('playPauseBtn');
            btn.innerText = '▶ 一括再生'; btn.classList.add('primary'); btn.classList.remove('playing-state');
            pauseAllPlayersOnly();
        }
        function playAllPlayersOnly() {
            broadcastSyncCommand('play');
            document.querySelectorAll('.custom-local-video').forEach(v => v.play().catch(e=>{}));
            Object.entries(ytPlayers).forEach(([id, player]) => {
                if (player && typeof player.playVideo === 'function') player.playVideo();
            });
        }
        function pauseAllPlayersOnly() {
            broadcastSyncCommand('pause');
            document.querySelectorAll('.custom-local-video').forEach(v => v.pause());
            Object.values(ytPlayers).forEach(player => {
                if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
            });
        }
        function skipAll(seconds) { applySeekToAll(seconds, true, null); }
        function changeMasterVolume(value) {
            document.querySelectorAll('.custom-local-video').forEach(v => {
                v.volume = Math.max(0, Math.min(1, value / 100));
                // cardIdは 'card_3' のようにアンダースコアを含むため split('_')[1] では 'card' になってしまう。
                // prefixを除去する方式に修正。
                const cardId = v.id.replace('localVideo_', '');
                const localVolInput = document.getElementById('localVolume_' + cardId);
                if (localVolInput) localVolInput.value = value;
                const icon = document.getElementById('localVolIcon_' + cardId);
                if (icon) icon.innerText = v.volume === 0 ? '🔇' : (v.volume < 0.5 ? '🔉' : '🔊');
            });
            Object.values(ytPlayers).forEach(player => {
                if (player && typeof player.setVolume === 'function') player.setVolume(value);
            });
        }

        /* ------------------------------------------------------------
           タイマーのティック処理
           「時間同調の基準（マスター）」の種別に応じて globalCurrentTime を更新する。

           ・local_<cardId> : そのローカル動画の再生位置をそのまま反映（壁時計は使わない）
           ・internal       : 実経過時間 × 再生速度 を加算（再生中のみ）
           ・external       : アドオンへ定期的に requestTime を送り、timeReport の返答で更新

           【設計上の注意】
           この処理が書き換えるのは #mainTimer のテキストのみで、
           <select> の option や DOM構造には一切触れない。
           過去に発生していた「ポーリングによるちらつき・プルダウンが閉じる」不具合は
           DOMプロパティの再書き込みが原因だったため、ここでは再発しない。

           setInterval + performance.now() の差分方式を採用している。
           バックグラウンドタブでタイマーが間引かれても、実経過時間から算出するため
           ズレが蓄積しない（requestAnimationFrame は非表示タブで停止するため不採用）。
           ------------------------------------------------------------ */
        let timerTickHandle = null;
        const TIMER_TICK_MS = 250;
        // 外部配信サイトへの時間問い合わせ間隔（250ms × 2 = 500ms ごと）
        const EXTERNAL_POLL_TICKS = 2;
        let externalPollCounter = 0;

        function syncGlobalTimeFromMaster() {
            const now = performance.now();
            const elapsedSec = (now - lastTimeUpdate) / 1000;
            lastTimeUpdate = now;

            const mode = getCurrentMasterType();

            if (mode.startsWith('local_')) {
                const video = document.getElementById('localVideo_' + mode.replace('local_', ''));
                if (video) {
                    globalCurrentTime = video.currentTime;
                    globalDuration = isFinite(video.duration) ? video.duration : 0;
                }
            } else if (mode === 'internal') {
                globalDuration = 0;
                // カウントダウン中は isPlayingRequest が true でも実際には未再生のため進めない
                if (isPlayingRequest && !countdownInterval) {
                    globalCurrentTime += elapsedSec * currentPlaybackSpeed;
                }
            } else if (mode === 'external') {
                // 外部配信サイトが基準の場合、アドオン側（content_video.js）は
                // requestTime を受け取ったときしか timeReport を送らない。
                // そのため、ここから定期的に現在時間を要求し続ける。
                //
                // ポーリング方式にしている利点:
                //   ・A側の「一括再生」だけでなく、配信サイト側で直接再生した場合も追従する
                //   ・配信サイト側で一時停止すれば報告値が止まるため、タイマーも自然に停止する
                //   ・B側（アドオン）の改修が不要（requestTime / timeReport は実装済み）
                globalDuration = 0; // 外部動画の総再生時間は取得できないため常に0
                externalPollCounter++;
                if (externalPollCounter >= EXTERNAL_POLL_TICKS) {
                    externalPollCounter = 0;
                    broadcastSyncCommand('requestTime');
                }
            }
            // globalCurrentTime の実際の更新は timeReport 受信ハンドラ側で行われる

            updateTimerDisplay();
        }

        function startTimerTick() {
            if (timerTickHandle) return;
            lastTimeUpdate = performance.now();
            timerTickHandle = setInterval(syncGlobalTimeFromMaster, TIMER_TICK_MS);
        }

        function updateTimerDisplay() {
            if (!isEditingTimer) {
                const cur = formatTime(globalCurrentTime);
                const dur = formatTime(globalDuration);
                document.getElementById('mainTimer').innerText = globalDuration > 0 ? cur + ' / ' + dur : cur;
            }
        }

        function editTimer() {
            isEditingTimer = true;
            const display = document.getElementById('mainTimer');
            const input = document.getElementById('timerInput');
            input.value = display.innerText.split(' / ')[0];
            display.style.display = 'none'; input.style.display = 'inline-block'; input.focus();
        }
        function finishEditTimer() {
            if (!isEditingTimer) return;
            isEditingTimer = false;
            const display = document.getElementById('mainTimer');
            const input = document.getElementById('timerInput');
            const parts = input.value.split(':').reverse();
            let sec = 0;
            if (parts[0]) sec += parseFloat(parts[0]) || 0;
            if (parts[1]) sec += (parseFloat(parts[1]) || 0) * 60;
            if (parts[2]) sec += (parseFloat(parts[2]) || 0) * 3600;
            globalCurrentTime = Math.max(0, sec);
            broadcastSyncCommand('seekTo', globalCurrentTime);
            document.querySelectorAll('.custom-local-video').forEach(v => { v.currentTime = globalCurrentTime; });
            Object.entries(ytPlayers).forEach(([id, player]) => {
                if (player && typeof player.seekTo === 'function') player.seekTo(globalCurrentTime, true);
            });
            display.style.display = 'inline-block'; input.style.display = 'none'; updateTimerDisplay();
        }
        function resetGlobalTimer() {
            globalCurrentTime = 0;
            broadcastSyncCommand('seekTo', 0);
            document.querySelectorAll('.custom-local-video').forEach(v => { v.currentTime = 0; });
            Object.entries(ytPlayers).forEach(([id, player]) => {
                if (player && typeof player.seekTo === 'function') player.seekTo(0, true);
            });
            updateTimerDisplay();
        }
        function requestExternalTime() { broadcastSyncCommand('requestTime'); }

        function toggleControllerLock() {
            isControllerLocked = !isControllerLocked;
            const btn = document.getElementById('lockControllerBtn');
            btn.innerText = isControllerLocked ? '🔒' : '🔓';
            saveSettings();
            if (isControllerLocked) showController(); else hideController();
        }
        function showController() {
            const controller = document.getElementById('overlayController');
            const mainView = document.getElementById('mainView');
            controller.classList.add('active'); mainView.classList.add('controller-active'); 
        }
        function hideController() {
            if (isControllerLocked) return;
            const controller = document.getElementById('overlayController');
            const mainView = document.getElementById('mainView');
            controller.classList.remove('active'); mainView.classList.remove('controller-active'); 
        }
        function setupHoverController() {
            const controller = document.getElementById('overlayController');
            let hideTimer;
            document.addEventListener('mousemove', (e) => {
                if (e.clientY > window.innerHeight - 80) { showController(); clearTimeout(hideTimer); } 
                else { clearTimeout(hideTimer); hideTimer = setTimeout(() => { if (!controller.matches(':hover')) hideController(); }, 1500); }
            });
            controller.addEventListener('mouseenter', () => { showController(); clearTimeout(hideTimer); });
            controller.addEventListener('mouseleave', () => { clearTimeout(hideTimer); hideTimer = setTimeout(() => { hideController(); }, 1000); });
        }

        function saveSettings() {
            localStorage.setItem('sync_layout2_dir', document.getElementById('layout2Dir').value);
            const colsEl = document.getElementById('layoutCols');
            if (colsEl) localStorage.setItem('sync_layout_cols', colsEl.value);
            localStorage.setItem('sync_player_count', playerCount); 
            localStorage.setItem('sync_ui_size', document.getElementById('uiSizeSelect').value);
            localStorage.setItem('sync_chat_position', document.getElementById('chatPosition').value);
            localStorage.setItem('sync_skip_sec_back', document.getElementById('skipSecBack').value); 
            localStorage.setItem('sync_skip_sec_forward', document.getElementById('skipSecForward').value); 
            localStorage.setItem('sync_enable_delay_sync', document.getElementById('enableDelaySync').checked);
            localStorage.setItem('sync_delay_sec', document.getElementById('delaySec').value);
            localStorage.setItem('sync_playback_speed', currentPlaybackSpeed);
            localStorage.setItem('sync_master_volume', document.getElementById('masterVolume').value);
            localStorage.setItem('sync_controller_lock', isControllerLocked);
            localStorage.setItem('sync_confirm_reset', document.getElementById('confirmReset').checked);
            localStorage.setItem('sync_confirm_delete', document.getElementById('confirmDelete').checked);
            localStorage.setItem('sync_master_mode', getCurrentMasterType());
        }
        function loadSavedSettings() {
            if (localStorage.getItem('sync_layout2_dir')) setSelectValueSafe('layout2Dir', localStorage.getItem('sync_layout2_dir'), 'horizontal');
            if (localStorage.getItem('sync_layout_cols')) setSelectValueSafe('layoutCols', localStorage.getItem('sync_layout_cols'), 'auto');
            if (localStorage.getItem('sync_player_count')) {
                playerCount = parseInt(localStorage.getItem('sync_player_count'), 10) || 2;
                updatePlayerCountDisplay();
            }
            if (localStorage.getItem('sync_ui_size')) {
                const size = localStorage.getItem('sync_ui_size');
                document.getElementById('uiSizeSelect').value = size; document.documentElement.setAttribute('data-ui-size', size);
            }
            if (localStorage.getItem('sync_chat_position')) document.getElementById('chatPosition').value = localStorage.getItem('sync_chat_position');
            if (localStorage.getItem('sync_skip_sec_back')) document.getElementById('skipSecBack').value = localStorage.getItem('sync_skip_sec_back');
            if (localStorage.getItem('sync_skip_sec_forward')) document.getElementById('skipSecForward').value = localStorage.getItem('sync_skip_sec_forward');
            if (localStorage.getItem('sync_enable_delay_sync') !== null) document.getElementById('enableDelaySync').checked = localStorage.getItem('sync_enable_delay_sync') === 'true';
            if (localStorage.getItem('sync_delay_sec')) document.getElementById('delaySec').value = localStorage.getItem('sync_delay_sec');
            if (localStorage.getItem('sync_playback_speed')) {
                currentPlaybackSpeed = parseFloat(localStorage.getItem('sync_playback_speed')) || 1.0;
                document.getElementById('speedDisplay').innerText = currentPlaybackSpeed.toFixed(1);
            }
            if (localStorage.getItem('sync_master_volume')) document.getElementById('masterVolume').value = localStorage.getItem('sync_master_volume');
            if (localStorage.getItem('sync_controller_lock') === 'true') {
                isControllerLocked = true;
                const btn = document.getElementById('lockControllerBtn');
                if (btn) btn.innerText = '🔒';
                showController();
            }
            if (localStorage.getItem('sync_confirm_reset') !== null) document.getElementById('confirmReset').checked = localStorage.getItem('sync_confirm_reset') === 'true';
            if (localStorage.getItem('sync_confirm_delete') !== null) document.getElementById('confirmDelete').checked = localStorage.getItem('sync_confirm_delete') === 'true';
            toggleDelaySettingView();
            setTimeout(() => {
                const savedMaster = localStorage.getItem('sync_master_mode');
                if (savedMaster) {
                    const select = document.getElementById('syncMasterSelect');
                    if (select && select.querySelector('option[value="' + savedMaster + '"]')) select.value = savedMaster;
                }
                updateMasterOptions();
            }, 300);
        }
        function clearAllSettings() {
            if (confirm('すべての設定と保存URLをリセットしますか？')) { localStorage.clear(); location.reload(); }
        }
</script>
